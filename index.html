<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學小樂園</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cat-purple: #7C5CBF;
  --cat-pink:   #FF6B9D;
  --dog-brown:  #C0692A;
  --dog-amber:  #F4A340;
  --text:       #2C1A08;
  --text2:      #8A6040;
  --bg:         #FFFBF5;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── Background ── */
.bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: linear-gradient(160deg, #FFF0E8 0%, #FFFBF5 40%, #F0EEFF 100%);
  overflow: hidden;
}
.blob {
  position: absolute; border-radius: 50%;
  filter: blur(60px); opacity: 0.35;
}
.blob1 { width: 400px; height: 400px; background: #FFD166; top: -100px; right: -80px; animation: float1 8s ease-in-out infinite; }
.blob2 { width: 300px; height: 300px; background: #C4B5FD; bottom: 10%; left: -60px; animation: float2 10s ease-in-out infinite; }
.blob3 { width: 200px; height: 200px; background: #FCA5A5; top: 50%; right: 5%; animation: float1 12s ease-in-out infinite reverse; }
@keyframes float1 { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-24px);} }
@keyframes float2 { 0%,100%{transform:translateY(0);} 50%{transform:translateY(20px);} }

/* Stars */
.star { position: absolute; font-size: 18px; animation: twinkle ease-in-out infinite; opacity: 0; }
@keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.6);} 50%{opacity:1;transform:scale(1);} }

/* ── Layout ── */
.page {
  position: relative; z-index: 1;
  max-width: 560px; margin: 0 auto;
  padding: 48px 20px 60px;
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* ── Header ── */
.header { text-align: center; margin-bottom: 48px; }
.emoji-row {
  font-size: 52px; margin-bottom: 16px;
  display: flex; justify-content: center; gap: 8px;
  animation: bounce-in 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes bounce-in { from{transform:scale(0) rotate(-10deg);opacity:0;} to{transform:scale(1) rotate(0);opacity:1;} }
.title {
  font-size: 36px; font-weight: 900; color: var(--text);
  letter-spacing: -0.5px; margin-bottom: 10px;
  animation: fade-up 0.6s ease 0.2s both;
}
.subtitle {
  font-size: 15px; color: var(--text2); font-weight: 600;
  line-height: 1.6;
  animation: fade-up 0.6s ease 0.35s both;
}
@keyframes fade-up { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }

/* ── Cards ── */
.cards { display: flex; flex-direction: column; gap: 16px; width: 100%; }

.game-card {
  display: block; text-decoration: none;
  background: white; border-radius: 24px;
  padding: 0; overflow: hidden;
  box-shadow: 0 4px 0 rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.07);
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
  animation: fade-up 0.6s ease both;
}
.game-card:nth-child(1) { animation-delay: 0.45s; }
.game-card:nth-child(2) { animation-delay: 0.55s; }
.game-card:hover { transform: translateY(-4px) scale(1.01); box-shadow: 0 8px 0 rgba(0,0,0,0.08), 0 16px 40px rgba(0,0,0,0.1); }
.game-card:active { transform: translateY(1px) scale(0.99); }

.card-banner {
  height: 8px;
}
.cat-banner { background: linear-gradient(90deg, var(--cat-purple), var(--cat-pink)); }
.dog-banner { background: linear-gradient(90deg, var(--dog-brown), var(--dog-amber)); }

.card-body {
  padding: 22px 24px 24px;
  display: flex; align-items: center; gap: 18px;
}
.card-icon {
  font-size: 52px; flex-shrink: 0;
  animation: wobble 3s ease-in-out infinite;
}
.game-card:nth-child(2) .card-icon { animation-delay: -1.5s; }
@keyframes wobble { 0%,100%{transform:rotate(-5deg);} 50%{transform:rotate(5deg);} }

.card-text { flex: 1; }
.card-title {
  font-size: 20px; font-weight: 900; color: var(--text);
  margin-bottom: 4px;
}
.cat-card .card-title { color: var(--cat-purple); }
.dog-card .card-title { color: var(--dog-brown); }

.card-desc { font-size: 13px; color: var(--text2); font-weight: 600; line-height: 1.5; margin-bottom: 10px; }

.tags { display: flex; flex-wrap: wrap; gap: 6px; }
.tag {
  font-size: 11px; font-weight: 800;
  padding: 3px 10px; border-radius: 99px;
  letter-spacing: 0.3px;
}
.cat-tag { background: #EDE8FF; color: var(--cat-purple); }
.dog-tag { background: #FFF4E0; color: var(--dog-brown); }

.card-arrow {
  font-size: 22px; flex-shrink: 0; opacity: 0.35;
  transition: opacity 0.2s, transform 0.2s;
}
.game-card:hover .card-arrow { opacity: 0.8; transform: translateX(4px); }

/* ── Footer ── */
.footer {
  margin-top: 40px; text-align: center;
  font-size: 13px; color: var(--text2); font-weight: 600;
  animation: fade-up 0.6s ease 0.65s both;
}
.footer span { opacity: 0.5; }
</style>
</head>
<body>

<div class="bg">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
</div>

<div class="page">
  <header class="header">
    <h1 class="title">數學小樂園</h1>
    <p class="subtitle">邊玩邊學，18以內的加減法<br>動畫教學 × 步驟拆解 × 湊10法</p>
  </header>

  <div class="cards">
    <a class="game-card cat-card" href="cat-math.html">
      <div class="card-banner cat-banner"></div>
      <div class="card-body">
        <div class="card-icon">🐱</div>
        <div class="card-text">
          <div class="card-title">貓咪加法樂園</div>
          <div class="card-desc">用湊10法學會18以內加法<br>貓咪動畫一步步帶你算</div>
          <div class="tags">
            <span class="tag cat-tag">加法</span>
            <span class="tag cat-tag">湊10法</span>
            <span class="tag cat-tag">動畫教學</span>
            <span class="tag cat-tag">18以內</span>
          </div>
        </div>
        <div class="card-arrow">→</div>
      </div>
    </a>

    <a class="game-card dog-card" href="dog-math.html">
      <div class="card-banner dog-banner"></div>
      <div class="card-body">
        <div class="card-icon">🐶</div>
        <div class="card-text">
          <div class="card-title">狗狗減法樂園</div>
          <div class="card-desc">用拆10法學會18以內減法<br>看狗狗跑走，算出剩幾隻</div>
          <div class="tags">
            <span class="tag dog-tag">減法</span>
            <span class="tag dog-tag">拆10法</span>
            <span class="tag dog-tag">動畫教學</span>
            <span class="tag dog-tag">18以內</span>
          </div>
        </div>
        <div class="card-arrow">→</div>
      </div>
    </a>
  </div>

  <footer class="footer">
    <span>適合一年級 · 電腦與手機都可以玩</span>
  </footer>
</div>

<script>
// Sprinkle stars
const emojis = ['⭐','✨','💫','🌟'];
for(let i=0;i<12;i++){
  const s = document.createElement('div');
  s.className = 'star';
  s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  s.style.cssText = `
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    animation-duration:${2+Math.random()*3}s;
    animation-delay:${Math.random()*4}s;
    font-size:${12+Math.random()*14}px;
  `;
  document.querySelector('.bg').appendChild(s);
}
</script>
</body>
</html>
